<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Planner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary:#ffffff; --bg-secondary:#f5f5f3; --bg-tertiary:#eeedeb;
  --text-primary:#1a1a18; --text-secondary:#5f5e5a; --text-tertiary:#88877f;
  --border:rgba(0,0,0,0.12); --border-md:rgba(0,0,0,0.22);
  --radius-md:8px; --radius-lg:12px;
  --info-bg:#e6f1fb; --info-text:#0c447c;
  --success-bg:#eaf3de; --success-text:#27500a;
  --warning-bg:#faeeda; --warning-text:#633806;
  --danger-bg:#fcebeb; --danger-text:#a32d2d;
  --sidebar-w:220px;
}
@media (prefers-color-scheme:dark){:root{
  --bg-primary:#1c1c1a; --bg-secondary:#252523; --bg-tertiary:#2e2e2c;
  --text-primary:#e8e6de; --text-secondary:#9c9a92; --text-tertiary:#6b6a64;
  --border:rgba(255,255,255,0.1); --border-md:rgba(255,255,255,0.2);
  --info-bg:#042c53; --info-text:#85b7eb;
  --success-bg:#173404; --success-text:#97c459;
  --warning-bg:#412402; --warning-text:#ef9f27;
  --danger-bg:#501313; --danger-text:#f09595;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;color:var(--text-primary);background:var(--bg-tertiary);height:100vh;overflow:hidden;}

#lock-screen{position:fixed;inset:0;background:var(--bg-tertiary);display:flex;align-items:center;justify-content:center;z-index:999;}
#lock-screen.hidden{display:none;}
.lock-card{background:var(--bg-primary);border:0.5px solid var(--border-md);border-radius:var(--radius-lg);padding:36px 40px;width:340px;text-align:center;}
.lock-card h2{font-size:16px;font-weight:500;margin-bottom:6px;}
.lock-card p{font-size:13px;color:var(--text-tertiary);margin-bottom:24px;}
.lock-card input{width:100%;padding:9px 12px;border:0.5px solid var(--border-md);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:14px;font-family:inherit;margin-bottom:10px;text-align:center;letter-spacing:.05em;}
.lock-card input:focus{outline:none;border-color:var(--info-text);}
.lock-error{font-size:12px;color:var(--danger-text);margin-bottom:10px;min-height:18px;}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text-primary);color:var(--bg-primary);padding:8px 18px;border-radius:20px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:500;white-space:nowrap;}
#toast.show{opacity:1;}

#sync-dot{width:7px;height:7px;border-radius:50%;background:#3b6d11;display:inline-block;margin-right:6px;transition:background .3s;}
#sync-dot.syncing{background:#ef9f27;animation:pulse .8s ease-in-out infinite;}
#sync-dot.error{background:#a32d2d;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

#app{display:flex;height:100vh;overflow:hidden;}
#sidebar{width:var(--sidebar-w);border-right:0.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--bg-secondary);overflow:hidden;}
.sidebar-header{padding:16px 14px 12px;border-bottom:0.5px solid var(--border);}
.sidebar-header h1{font-size:14px;font-weight:600;}
.sidebar-header p{font-size:11px;color:var(--text-tertiary);margin-top:2px;display:flex;align-items:center;}
.nav-section{padding:10px 8px 0;flex:1;overflow-y:auto;}
.nav-label{font-size:10px;font-weight:600;color:var(--text-tertiary);letter-spacing:.06em;text-transform:uppercase;padding:0 6px 6px;}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 8px;border-radius:var(--radius-md);border:none;background:none;cursor:pointer;font-size:13px;color:var(--text-secondary);text-align:left;transition:background .15s;font-family:inherit;}
.nav-btn:hover{background:var(--bg-primary);color:var(--text-primary);}
.nav-btn.active{background:var(--bg-primary);color:var(--text-primary);font-weight:500;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.team-section{padding:10px 8px 14px;border-top:0.5px solid var(--border);}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-primary);}
#topbar{padding:12px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#topbar h2{font-size:15px;font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.btn{padding:6px 12px;border-radius:var(--radius-md);border:0.5px solid var(--border-md);background:none;cursor:pointer;font-size:12px;color:var(--text-secondary);transition:background .15s;font-family:inherit;}
.btn:hover{background:var(--bg-secondary);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--text-primary);color:var(--bg-primary);border-color:var(--text-primary);}
.btn-primary:hover{opacity:.85;background:var(--text-primary);}
.btn-sm{padding:3px 8px;font-size:11px;}
#content{flex:1;overflow-y:auto;padding:20px;}

.loading{text-align:center;padding:60px 20px;color:var(--text-tertiary);font-size:13px;}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--text-secondary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

.dl-badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500;white-space:nowrap;}
.dl-ok{background:var(--success-bg);color:var(--success-text);}
.dl-soon{background:var(--warning-bg);color:var(--warning-text);}
.dl-overdue{background:var(--danger-bg);color:var(--danger-text);}

.goal-card{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:12px;overflow:hidden;}
.goal-header{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.goal-title{font-weight:500;font-size:14px;flex:1;}
.goal-meta{font-size:11px;color:var(--text-tertiary);margin-top:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin:0 16px 14px;}
.progress-fill{height:100%;border-radius:2px;transition:width .4s;}
.goal-body{border-top:0.5px solid var(--border);}

.activity-row{border-bottom:0.5px solid var(--border);}
.activity-row:last-child{border-bottom:none;}
.activity-header{display:flex;align-items:center;gap:8px;padding:10px 16px 10px 20px;cursor:pointer;user-select:none;}
.activity-header:hover{background:var(--bg-secondary);}
.activity-name{font-size:13px;font-weight:500;flex:1;}
.activity-meta-row{font-size:11px;color:var(--text-tertiary);padding:0 16px 8px 44px;}

.task-list{padding:4px 16px 10px 44px;}
.task-row{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:6px;}
.task-row:hover{background:var(--bg-secondary);}
.task-check{width:15px;height:15px;border:0.5px solid var(--border-md);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border .15s;}
.task-check.done{background:#3b6d11;border-color:#3b6d11;}
.task-check.done::after{content:'';display:block;width:8px;height:5px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px);}
.task-label{font-size:12px;flex:1;}
.task-label.done{text-decoration:line-through;color:var(--text-tertiary);}
.task-week-tag{font-size:10px;color:var(--text-tertiary);background:var(--bg-secondary);padding:1px 5px;border-radius:4px;white-space:nowrap;}
.delete-btn{background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:15px;padding:0 2px;opacity:0;transition:opacity .15s;line-height:1;flex-shrink:0;}
.task-row:hover .delete-btn,.activity-header:hover .delete-btn,.goal-header:hover .delete-btn{opacity:1;}
.delete-btn:hover{color:var(--danger-text);}
.collapsed{display:none;}
.chev{font-size:10px;color:var(--text-tertiary);transition:transform .2s;display:inline-block;flex-shrink:0;}
.chev.open{transform:rotate(90deg);}

.week-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;}
.day-col{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);min-height:320px;overflow:hidden;}
.day-header{padding:10px 12px;border-bottom:0.5px solid var(--border);}
.day-name{font-size:11px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;}
.day-date{font-size:18px;font-weight:500;line-height:1.2;}
.day-date.today{color:var(--info-text);}
.day-tasks{padding:8px;}
.day-task{padding:7px 9px;border-radius:6px;margin-bottom:6px;cursor:grab;border:0.5px solid transparent;transition:border .15s;}
.day-task:hover{border-color:var(--border-md) !important;}
.day-task-title{font-size:12px;font-weight:500;line-height:1.3;}
.day-task-sub{font-size:10px;margin-top:2px;opacity:.7;}
.drop-hint{border:0.5px dashed var(--border-md);border-radius:6px;padding:7px 9px;font-size:11px;color:var(--text-tertiary);text-align:center;margin-bottom:6px;display:none;}
.day-col.drag-over .drop-hint{display:block;}
.add-task-day{width:100%;padding:5px 8px;background:none;border:none;font-size:11px;color:var(--text-tertiary);text-align:left;cursor:pointer;border-radius:4px;font-family:inherit;}
.add-task-day:hover{color:var(--text-secondary);background:var(--bg-secondary);}

.team-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
.member-card{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.member-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--border);}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;}
.member-name{font-weight:500;font-size:13px;}
.member-role{font-size:11px;color:var(--text-tertiary);}
.member-stats{display:flex;gap:12px;padding:10px 16px;border-bottom:0.5px solid var(--border);}
.stat{text-align:center;}
.stat-val{font-size:18px;font-weight:500;line-height:1.1;}
.stat-label{font-size:10px;color:var(--text-tertiary);margin-top:1px;}
.member-tasks{padding:8px 12px 12px;}

#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:100;}
#modal-overlay.open{display:flex;}
#modal{background:var(--bg-primary);border-radius:var(--radius-lg);border:0.5px solid var(--border-md);width:500px;max-width:calc(100vw - 32px);max-height:90vh;overflow-y:auto;}
.modal-header{padding:16px 20px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg-primary);z-index:1;}
.modal-header h3{font-size:14px;font-weight:500;}
.modal-step{font-size:11px;color:var(--text-tertiary);margin-top:3px;}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-tertiary);line-height:1;flex-shrink:0;}
.modal-body{padding:20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;border:0.5px solid var(--border-md);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;font-family:inherit;}
.field input:focus,.field select:focus{outline:none;border-color:var(--info-text);}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;margin-bottom:14px;}
.modal-footer{padding:12px 20px;border-top:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;background:var(--bg-primary);}
.modal-footer-right{display:flex;gap:8px;}

.task-builder{border:0.5px solid var(--border);border-radius:var(--radius-md);overflow:hidden;margin-top:4px;}
.task-builder-header{padding:10px 14px;background:var(--bg-secondary);font-size:12px;font-weight:500;color:var(--text-secondary);border-bottom:0.5px solid var(--border);}
.task-builder-list{max-height:280px;overflow-y:auto;}
.tb-task{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:0.5px solid var(--border);}
.tb-task:last-child{border-bottom:none;}
.tb-num{font-size:11px;color:var(--text-tertiary);width:16px;flex-shrink:0;text-align:right;}
.tb-task input[type=text]{flex:1;min-width:0;padding:5px 8px;border:0.5px solid var(--border-md);border-radius:6px;font-size:12px;background:var(--bg-primary);color:var(--text-primary);font-family:inherit;}
.tb-task input[type=date]{padding:5px 8px;border:0.5px solid var(--border-md);border-radius:6px;font-size:11px;background:var(--bg-primary);color:var(--text-primary);font-family:inherit;width:136px;flex-shrink:0;}
.tb-task select{padding:5px 6px;border:0.5px solid var(--border-md);border-radius:6px;font-size:11px;background:var(--bg-primary);color:var(--text-primary);font-family:inherit;flex-shrink:0;}
.tb-remove{background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:16px;line-height:1;padding:0 2px;flex-shrink:0;}
.tb-remove:hover{color:var(--danger-text);}
.tb-add{padding:9px 14px;font-size:12px;color:var(--text-tertiary);cursor:pointer;background:none;border:none;font-family:inherit;text-align:left;width:100%;display:block;}
.tb-add:hover{background:var(--bg-secondary);color:var(--text-secondary);}
.sched-hint{font-size:11px;color:var(--text-tertiary);background:var(--info-bg);color:var(--info-text);padding:8px 12px;border-radius:6px;margin-top:10px;}

select{cursor:pointer;}
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-card">
    <h2>Team Planner</h2>
    <p>Enter your team password to continue</p>
    <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="lock-error" id="pw-error"></div>
    <button class="btn btn-primary" style="width:100%;padding:9px;" onclick="checkPw()">Unlock</button>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <h1>Team Planner</h1>
      <p><span id="sync-dot"></span><span id="sync-label">Connecting…</span></p>
    </div>
    <div class="nav-section">
      <div class="nav-label">Views</div>
      <button class="nav-btn active" onclick="showView('goals')" id="nav-goals">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.2"/><circle cx="7" cy="7" r="2" fill="currentColor"/></svg>
        Goals &amp; activities
      </button>
      <button class="nav-btn" onclick="showView('week')" id="nav-week">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M1 5h12" stroke="currentColor" stroke-width="1.2"/><path d="M4 1v2M10 1v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Week plan
      </button>
      <button class="nav-btn" onclick="showView('team')" id="nav-team">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="5" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2"/><circle cx="10" cy="5" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M1 12c0-2 1.8-3.5 4-3.5s4 1.5 4 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M11 8.5c1.2.4 2 1.5 2 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Team board
      </button>
      <div class="nav-label" style="margin-top:16px;">Weeks</div>
      <div id="sidebar-weeks"></div>
    </div>
    <div class="team-section">
      <div class="nav-label">Team</div>
      <div id="sidebar-members"></div>
    </div>
  </div>

  <div id="main">
    <div id="topbar">
      <h2 id="view-title">Goals &amp; Activities</h2>
      <div class="topbar-right">
        <select id="member-filter" class="btn" onchange="renderAll()"><option value="all">All members</option></select>
        <button class="btn btn-primary" id="add-btn" onclick="openGoalModal()">+ Add goal</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div class="modal-header">
      <div>
        <h3 id="modal-title">Add goal</h3>
        <div class="modal-step" id="modal-step"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <div id="modal-footer-left"></div>
      <div class="modal-footer-right">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modal-save-btn" onclick="handleModalSave()">Save</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL  = 'https://ougdszmisjtjmvmdgflc.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Rzem1pc2p0am12bWRnZmxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjU1ODksImV4cCI6MjA4OTQwMTU4OX0.sfFRVT53IdHtcDRl01WfKiwEs9hEHxOB2mk4KvhkoEE';
const TEAM_PASSWORD = 'SbWbud3ttPAULf';

const MEMBERS = [
  {id:1,name:'Ameli Q',initials:'AQ',role:'Digital Specialist',colorIdx:0},
  {id:2,name:'Sara F',initials:'SF',role:'E-Commerce Specialist',colorIdx:1},
  {id:3,name:'Marcus A',initials:'MA',role:'Customer Insights Analyst',colorIdx:2},
  {id:4,name:'New Member',initials:'NM',role:'Retention Specialist',colorIdx:3},
];
const COLORS=[
  {bg:'#E6F1FB',text:'#0C447C',dot:'#378ADD'},
  {bg:'#E1F5EE',text:'#085041',dot:'#1D9E75'},
  {bg:'#FAEEDA',text:'#633806',dot:'#EF9F27'},
  {bg:'#FBEAF0',text:'#72243E',dot:'#D4537E'},
];
const WEEK_DEFS=[
  {label:'W12',display:'W12 (Mar 18–22)',monDate:'2026-03-18'},
  {label:'W13',display:'W13 (Mar 25–29)',monDate:'2026-03-25'},
  {label:'W14',display:'W14 (Apr 1–5)',monDate:'2026-04-01'},
  {label:'W15',display:'W15 (Apr 7–11)',monDate:'2026-04-07'},
  {label:'W16',display:'W16 (Apr 14–18)',monDate:'2026-04-14'},
  {label:'W17',display:'W17 (Apr 22–25)',monDate:'2026-04-22'},
  {label:'W18',display:'W18 (Apr 28–May 2)',monDate:'2026-04-28'},
  {label:'W19',display:'W19 (May 5–9)',monDate:'2026-05-05'},
  {label:'W20',display:'W20 (May 12–16)',monDate:'2026-05-12'},
  {label:'W21',display:'W21 (May 19–23)',monDate:'2026-05-19'},
  {label:'W22',display:'W22 (May 26–30)',monDate:'2026-05-26'},
];
const DAYS=['Mon','Tue','Wed','Thu','Fri'];
const TODAY=new Date().toISOString().slice(0,10);
const TODAY_WEEK=0, TODAY_DAY=2;

// Auth
function checkPw(){
  if(document.getElementById('pw-input').value===TEAM_PASSWORD){
    sessionStorage.setItem('tp-auth','1');
    document.getElementById('lock-screen').classList.add('hidden');
    init();
  } else {
    document.getElementById('pw-error').textContent='Incorrect password.';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}
if(sessionStorage.getItem('tp-auth')==='1') document.getElementById('lock-screen').classList.add('hidden');

const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_ANON);

let goals=[],activities=[],tasks=[];
let currentView='goals',currentWeek=TODAY_WEEK;
let modalMode=null,modalCtx=null,pendingTasks=[];
let openGoals={},openActs={},draggedId=null;

const memberById=id=>MEMBERS.find(m=>m.id===id);
const mc=idx=>COLORS[idx%COLORS.length];
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function filterMid(){const v=document.getElementById('member-filter').value;return v==='all'?null:parseInt(v);}

function fmtDate(d){
  if(!d) return '';
  return new Date(d+'T00:00:00').toLocaleDateString('en-SE',{day:'numeric',month:'short'});
}
function deadlineBadge(d){
  if(!d) return '';
  const diff=(new Date(d+'T00:00:00')-new Date(TODAY+'T00:00:00'))/86400000;
  const lbl=fmtDate(d);
  if(diff<0)  return `<span class="dl-badge dl-overdue">⚠ ${lbl}</span>`;
  if(diff<=7) return `<span class="dl-badge dl-soon">⏳ ${lbl}</span>`;
  return `<span class="dl-badge dl-ok">📅 ${lbl}</span>`;
}
function goalProgress(gid){const t=tasks.filter(t=>t.goal_id===gid);return t.length?Math.round(t.filter(t=>t.done).length/t.length*100):0;}
function actProgress(aid){const t=tasks.filter(t=>t.activity_id===aid);return t.length?Math.round(t.filter(t=>t.done).length/t.length*100):0;}
function statusBadge(s){
  if(s==='done') return '<span class="badge badge-green">Done</span>';
  if(s==='in-progress') return '<span class="badge badge-blue">In progress</span>';
  return '<span class="badge badge-amber">Not started</span>';
}

// Smart scheduling: distributes tasks evenly from today to deadline
function smartSchedule(deadlineStr,taskIndex,totalTasks){
  if(!deadlineStr) return {weekIdx:currentWeek,dayIdx:TODAY_DAY};
  const dl=new Date(deadlineStr+'T00:00:00');
  // Find deadline slot
  let dlWeek=WEEK_DEFS.length-1,dlDay=4;
  outer: for(let wi=0;wi<WEEK_DEFS.length;wi++){
    const mon=new Date(WEEK_DEFS[wi].monDate+'T00:00:00');
    for(let di=0;di<5;di++){
      const d=new Date(mon);d.setDate(mon.getDate()+di);
      if(d.toISOString().slice(0,10)===deadlineStr){dlWeek=wi;dlDay=di;break outer;}
      if(d>dl){
        // deadline falls on weekend — use Friday of that week or prev Friday
        if(di===0){dlWeek=Math.max(0,wi-1);dlDay=4;}
        else{dlWeek=wi;dlDay=di-1;}
        break outer;
      }
    }
  }
  if(totalTasks<=1) return {weekIdx:dlWeek,dayIdx:dlDay};
  const startSlot=TODAY_WEEK*5+TODAY_DAY;
  const endSlot=dlWeek*5+dlDay;
  const range=Math.max(endSlot-startSlot,totalTasks-1);
  const step=range/(totalTasks-1);
  const slot=Math.round(startSlot+step*taskIndex);
  const clampedSlot=Math.min(slot,endSlot);
  return {weekIdx:Math.floor(clampedSlot/5),dayIdx:clampedSlot%5};
}

  document.getElementById('sync-dot').className=s;

function showToast(msg){

async function loadAll(){
  setSyncState('syncing','Loading…');
  document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div>Loading your plan…</div>';
  try{
    const[gr,ar,tr]=await Promise.all([
      db.from('goals').select('*').order('created_at'),
      db.from('activities').select('*').order('created_at'),
      db.from('tasks').select('*').order('created_at'),
    ]);
    if(gr.error) throw gr.error;
    goals=gr.data||[];activities=ar.data||[];tasks=tr.data||[];
    goals.forEach(g=>{if(openGoals[g.id]===undefined)openGoals[g.id]=true;});
    activities.forEach(a=>{if(openActs[a.id]===undefined)openActs[a.id]=true;});
    setSyncState('','Live');renderAll();
  } catch(e){
    setSyncState('error','Error');
    document.getElementById('content').innerHTML='<div class="loading">Could not connect. Check your internet.</div>';
  }
}
function subscribeRealtime(){
  db.channel('schema-db-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'goals'},()=>loadAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'activities'},()=>loadAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},()=>loadAll())
    .subscribe(s=>{
      if(s==='SUBSCRIBED') setSyncState('','Live');
      if(s==='CLOSED'||s==='CHANNEL_ERROR') setSyncState('error','Reconnecting…');
    });
}

async function dbAddGoal(title,colorIdx,deadline){
  setSyncState('syncing','Saving…');
  const{error}=await db.from('goals').insert({title,color_idx:colorIdx,deadline:deadline||null});
  if(error){showToast('Error saving');setSyncState('error','Error');}
}
async function dbDeleteGoal(id){
  if(!confirm('Delete this goal and everything under it?')) return;
  await db.from('goals').delete().eq('id',id);
}
async function dbAddActivity(goalId,title,status,deadline){
  setSyncState('syncing','Saving…');
  const{data,error}=await db.from('activities').insert({goal_id:goalId,title,status,deadline:deadline||null}).select().single();
  if(error){showToast('Error saving');setSyncState('error','Error');return null;}
  return data;
}
async function dbDeleteActivity(id){
  if(!confirm('Delete this activity and all its tasks?')) return;
  await db.from('activities').delete().eq('id',id);
}
async function dbAddTask(goalId,activityId,title,assigneeId,weekIdx,dayIdx,deadline){
  const{error}=await db.from('tasks').insert({goal_id:goalId,activity_id:activityId,title,assignee_id:assigneeId,week_idx:weekIdx,day_idx:dayIdx,done:false,deadline:deadline||null});

}
async function dbToggleTask(id,current){await db.from('tasks').update({done:!current}).eq('id',id);}
async function dbMoveTask(id,weekIdx,dayIdx){await db.from('tasks').update({week_idx:weekIdx,day_idx:dayIdx}).eq('id',id);}
async function dbDeleteTask(id){await db.from('tasks').delete().eq('id',id);}

function renderGoals(){

  goals.forEach(g=>{
    const prog=goalProgress(g.id);
    const c=mc(g.color_idx);
    const acts=activities.filter(a=>a.goal_id===g.id);
    html+=`<div class="goal-card">
      <div class="goal-header" onclick="toggleGoal('${g.id}')">
        <div style="width:4px;height:40px;border-radius:2px;background:${c.dot};flex-shrink:0;"></div>
        <div style="flex:1;min-width:0;">
          <div class="goal-title">${esc(g.title)}</div>
          <div class="goal-meta"><span>${acts.length} activities · ${prog}% complete</span>${deadlineBadge(g.deadline)}</div>
        </div>
        <button class="btn btn-sm" onclick="event.stopPropagation();openActivityModal('${g.id}')">+ Activity</button>
        <button class="delete-btn" onclick="event.stopPropagation();dbDeleteGoal('${g.id}')">×</button>
        <span class="chev ${openGoals[g.id]?'open':''}">▶</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${prog}%;background:${c.dot};"></div></div>
      <div class="goal-body ${openGoals[g.id]?'':'collapsed'}">`;

    if(!acts.length){
      html+=`<div style="padding:14px 20px 14px 24px;font-size:12px;color:var(--text-tertiary);">No activities yet — click <strong>+ Activity</strong> to add one.</div>`;
    }
    acts.forEach(a=>{
      const at=tasks.filter(t=>t.activity_id===a.id);
      const visible=fid?at.filter(t=>t.assignee_id===fid):at;
      if(fid&&!visible.length) return;
      const aprog=actProgress(a.id);
      html+=`<div class="activity-row">
        <div class="activity-header" onclick="toggleAct('${a.id}')">
          <span class="chev ${openActs[a.id]?'open':''}" style="font-size:9px;">▶</span>
          <span class="activity-name">${esc(a.title)}</span>
          ${statusBadge(a.status)}
          ${deadlineBadge(a.deadline)}
          <span style="font-size:11px;color:var(--text-tertiary);">${aprog}%</span>
          <button class="btn btn-sm" onclick="event.stopPropagation();openTaskModal({goalId:'${g.id}',activityId:'${a.id}',weekIdx:${currentWeek}})">+ Task</button>
          <button class="delete-btn" onclick="event.stopPropagation();dbDeleteActivity('${a.id}')">×</button>
        </div>
        <div class="activity-meta-row">${at.length} tasks · ${at.filter(t=>t.done).length} done</div>
        <div class="task-list ${openActs[a.id]?'':'collapsed'}">`;
      visible.forEach(t=>{
        const m=memberById(t.assignee_id);
        const tc=m?mc(m.colorIdx):COLORS[0];
        html+=`<div class="task-row" draggable="true" ondragstart="onDragStart(event,'${t.id}')">
          <div class="task-check ${t.done?'done':''}" onclick="dbToggleTask('${t.id}',${t.done})"></div>
          <span class="task-label ${t.done?'done':''}">${esc(t.title)}</span>
          ${m?`<span style="font-size:10px;background:${tc.bg};color:${tc.text};padding:1px 6px;border-radius:10px;">${m.initials}</span>`:''}
          ${t.deadline?deadlineBadge(t.deadline):''}
          <span class="task-week-tag">${WEEK_DEFS[t.week_idx]?WEEK_DEFS[t.week_idx].label:'?'} ${DAYS[t.day_idx]||''}</span>
          <button class="delete-btn" onclick="event.stopPropagation();dbDeleteTask('${t.id}')">×</button>
        </div>`;
      });
      html+=`</div></div>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById('content').innerHTML=html;
}
function toggleGoal(id){openGoals[id]=!openGoals[id];renderAll();}

function renderWeek(){
  const fid=filterMid();
  const wt=tasks.filter(t=>t.week_idx===currentWeek&&(!fid||t.assignee_id===fid));
  const wd=WEEK_DEFS[currentWeek];
  const monDate=new Date(wd.monDate+'T00:00:00');
  let html=`<div class="week-grid">`;
  DAYS.forEach((day,di)=>{
    const dt=wt.filter(t=>t.day_idx===di);
    const d=new Date(monDate);d.setDate(monDate.getDate()+di);
    const isToday=currentWeek===TODAY_WEEK&&di===TODAY_DAY;
    html+=`<div class="day-col" id="day-${di}"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="onDrop(event,${di})">
      <div class="day-header"><div class="day-name">${day}</div><div class="day-date ${isToday?'today':''}">${d.getDate()}</div></div>
      <div class="day-tasks"><div class="drop-hint">Drop here</div>`;
    dt.forEach(t=>{
      const g=goals.find(g=>g.id===t.goal_id);
      const gc=g?mc(g.color_idx):COLORS[0];
      const m=memberById(t.assignee_id);
      html+=`<div class="day-task" style="background:${gc.bg};" draggable="true" ondragstart="onDragStart(event,'${t.id}')">
        <div class="day-task-title" style="color:${gc.text};">${esc(t.title)}</div>
        <div class="day-task-sub" style="color:${gc.text};">${g?esc(g.title).substring(0,22)+'…':''}${m?' · '+m.initials:''}</div>
        ${t.deadline?`<div style="margin-top:3px;">${deadlineBadge(t.deadline)}</div>`:''}
      </div>`;
    });
    html+=`<button class="add-task-day" onclick="openTaskModal({weekIdx:${currentWeek},dayIdx:${di}})">+ Add task</button></div></div>`;
  });
  html+=`</div>`;
  document.getElementById('content').innerHTML=html;
}
function onDragStart(e,id){draggedId=id;e.dataTransfer.effectAllowed='move';}
function onDrop(e,dayIdx){
  e.preventDefault();
  document.querySelectorAll('.day-col').forEach(d=>d.classList.remove('drag-over'));
  if(!draggedId) return;
  dbMoveTask(draggedId,currentWeek,dayIdx);
  draggedId=null;
}

}

function advanceToTaskBuilder(){
  const title=document.getElementById('f-title')?.value?.trim();
  if(!title) return;
  modalCtx={...modalCtx,actTitle:title,actStatus:document.getElementById('f-status').value,actDeadline:document.getElementById('f-deadline').value};
  pendingTasks=pendingTasks.map(t=>({...t,deadline:t.deadline||modalCtx.actDeadline}));
  openTaskBuilder();
}

async function saveActivityWithTasks(){
  const valid=pendingTasks.filter(t=>t.title.trim());
  setModalBusy(true);
  const act=await dbAddActivity(modalCtx.goalId,modalCtx.actTitle,modalCtx.actStatus,modalCtx.actDeadline);
  if(!act){setModalBusy(false);return;}
  openGoals[modalCtx.goalId]=true;
  openActs[act.id]=true;
  setSyncState('syncing','Saving tasks…');
  for(let i=0;i<valid.length;i++){
    const t=valid[i];
    const effectiveDeadline=t.deadline||modalCtx.actDeadline||null;
    const sched=smartSchedule(effectiveDeadline,i,valid.length);
    await dbAddTask(modalCtx.goalId,act.id,t.title.trim(),t.assigneeId,sched.weekIdx,sched.dayIdx,effectiveDeadline);
  }
  setModalBusy(false);closeModal();
  showToast(`Activity added with ${valid.length} task${valid.length!==1?'s':''}!`);
}

async function saveStandaloneTask(){
  const title=document.getElementById('f-title')?.value?.trim();
  if(!title) return;
  setModalBusy(true);
  const deadline=document.getElementById('f-deadline').value||null;
  const weekIdx=parseInt(document.getElementById('f-week').value);
  const dayIdx=parseInt(document.getElementById('f-day').value);
  await dbAddTask(
    document.getElementById('f-goal').value,
    document.getElementById('f-activity').value,
    title,
    parseInt(document.getElementById('f-member').value),
    weekIdx,dayIdx,deadline
  );
  setModalBusy(false);closeModal();
}

document.getElementById('modal').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.target.tagName!=='TEXTAREA'&&e.target.tagName!=='BUTTON'){e.preventDefault();handleModalSave();}
  if(e.key==='Escape') closeModal();
});

async function init(){await loadAll();subscribeRealtime();}
if(sessionStorage.getItem('tp-auth')==='1') init();
</script>
