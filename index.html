<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Planner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeedeb;
  --tx:#1a1a18;--tx2:#5f5e5a;--tx3:#88877f;
  --bd:rgba(0,0,0,0.11);--bd2:rgba(0,0,0,0.2);
  --r:8px;--rl:12px;
  --ibg:#e6f1fb;--itx:#0c447c;
  --sbg:#eaf3de;--stx:#27500a;
  --wbg:#faeeda;--wtx:#633806;
  --dbg:#fcebeb;--dtx:#a32d2d;
  --sw:224px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2c;
  --tx:#e8e6de;--tx2:#9c9a92;--tx3:#6b6a64;
  --bd:rgba(255,255,255,0.09);--bd2:rgba(255,255,255,0.18);
  --ibg:#042c53;--itx:#85b7eb;
  --sbg:#173404;--stx:#97c459;
  --wbg:#412402;--wtx:#ef9f27;
  --dbg:#501313;--dtx:#f09595;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;color:var(--tx);background:var(--bg3);height:100vh;overflow:hidden;}
#lock{position:fixed;inset:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;z-index:999;}
#lock.off{display:none;}
.lcard{background:var(--bg);border:0.5px solid var(--bd2);border-radius:var(--rl);padding:36px 40px;width:340px;text-align:center;}
.lcard h2{font-size:16px;font-weight:500;margin-bottom:6px;}
.lcard p{font-size:13px;color:var(--tx3);margin-bottom:24px;}
.lcard input{width:100%;padding:9px 12px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx);font-size:14px;font-family:inherit;margin-bottom:10px;text-align:center;letter-spacing:.05em;}
.lcard input:focus{outline:none;border-color:var(--itx);}
.lerr{font-size:12px;color:var(--dtx);margin-bottom:10px;min-height:18px;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:8px 20px;border-radius:20px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:600;white-space:nowrap;}
#toast.on{opacity:1;}
#sdot{width:7px;height:7px;border-radius:50%;background:#3b6d11;display:inline-block;margin-right:6px;}
#sdot.sy{background:#ef9f27;animation:pu .8s ease-in-out infinite;}
#sdot.er{background:#a32d2d;}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
#cv{position:fixed;inset:0;pointer-events:none;z-index:800;display:none;}
#app{display:flex;height:100vh;overflow:hidden;}
#sb{width:var(--sw);border-right:0.5px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;background:var(--bg2);overflow:hidden;}
.sbh{padding:16px 14px 12px;border-bottom:0.5px solid var(--bd);}
.sbh h1{font-size:14px;font-weight:600;}
.sbh p{font-size:11px;color:var(--tx3);margin-top:2px;display:flex;align-items:center;}
.navs{padding:10px 8px 0;flex:1;overflow-y:auto;}
.nl{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase;padding:0 6px 6px;}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:7px 8px;border-radius:var(--r);border:none;background:none;cursor:pointer;font-size:13px;color:var(--tx2);text-align:left;transition:background .15s;font-family:inherit;}
.nb:hover{background:var(--bg);color:var(--tx);}
.nb.on{background:var(--bg);color:var(--tx);font-weight:500;}
.dot8{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tms{padding:10px 8px 14px;border-top:0.5px solid var(--bd);}
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
#tb{padding:12px 20px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#tb h2{font-size:15px;font-weight:500;}
.tbr{display:flex;align-items:center;gap:8px;}
.btn{padding:6px 12px;border-radius:var(--r);border:0.5px solid var(--bd2);background:none;cursor:pointer;font-size:12px;color:var(--tx2);transition:background .15s;font-family:inherit;}
.btn:hover{background:var(--bg2);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btnp{background:var(--tx);color:var(--bg);border-color:var(--tx);}
.btnp:hover{opacity:.85;background:var(--tx);}
.btnsm{padding:3px 8px;font-size:11px;}
#ct{flex:1;overflow-y:auto;padding:20px;}
.ldg{text-align:center;padding:60px 20px;color:var(--tx3);font-size:13px;}
.spin{width:24px;height:24px;border:2px solid var(--bd);border-top-color:var(--tx2);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 12px;}
@keyframes sp{to{transform:rotate(360deg)}}
.dlb{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500;white-space:nowrap;}
.dlo{background:var(--sbg);color:var(--stx);}
.dls{background:var(--wbg);color:var(--wtx);}
.dlx{background:var(--dbg);color:var(--dtx);}
.apil{font-size:10px;padding:1px 5px;border-radius:9px;font-weight:500;margin:1px;display:inline-block;}
.gc{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);margin-bottom:12px;overflow:hidden;}
.gh{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.gt{font-weight:500;font-size:14px;flex:1;min-width:0;}
.gm{font-size:11px;color:var(--tx3);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.pb{height:4px;background:var(--bd);border-radius:2px;margin:0 16px 12px;}
.pf{height:100%;border-radius:2px;transition:width .4s;}
.gbdy{border-top:0.5px solid var(--bd);}
.ar{border-bottom:0.5px solid var(--bd);}
.ar:last-child{border-bottom:none;}
.ahd{display:flex;align-items:center;gap:8px;padding:9px 16px 9px 20px;cursor:pointer;user-select:none;}
.ahd:hover{background:var(--bg2);}
.an{font-size:13px;font-weight:500;flex:1;min-width:0;}
.ameta{font-size:11px;color:var(--tx3);padding:0 16px 8px 44px;}
.tl{padding:4px 16px 10px 44px;}
.tr{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:6px;}
.tr:hover{background:var(--bg2);}
.tr:hover .dbtn,.tr:hover .ebtn{opacity:1;}
.ck{width:15px;height:15px;border:0.5px solid var(--bd2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border .15s;}
.ck.dn{background:#3b6d11;border-color:#3b6d11;}
.ck.dn::after{content:'';display:block;width:8px;height:5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);}
.tl2{font-size:12px;flex:1;min-width:0;}
.tl2.dn{text-decoration:line-through;color:var(--tx3);}
.wtag{font-size:10px;color:var(--tx3);background:var(--bg2);padding:1px 5px;border-radius:4px;white-space:nowrap;}
.dbtn{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:15px;padding:0 1px;opacity:0;line-height:1;flex-shrink:0;}
.dbtn:hover{color:var(--dtx);}
.ebtn{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:11px;padding:1px 4px;opacity:0;line-height:1;flex-shrink:0;border-radius:4px;}
.ebtn:hover{background:var(--bg3);color:var(--tx);}
.coll{display:none;}
.chv{font-size:10px;color:var(--tx3);transition:transform .2s;display:inline-block;flex-shrink:0;}
.chv.op{transform:rotate(90deg);}
.wg{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;}
.dc{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);min-height:360px;overflow:hidden;}
.dh{padding:10px 12px;border-bottom:0.5px solid var(--bd);}
.dn2{font-size:11px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;}
.dd{font-size:18px;font-weight:500;line-height:1.2;}
.dd.td{color:var(--itx);}
.dts{padding:8px;}
.dtk{padding:7px 9px;border-radius:6px;margin-bottom:6px;border:0.5px solid transparent;transition:border .15s;cursor:grab;}
.dtk:hover{border-color:var(--bd2) !important;}
.dtk-title{font-size:12px;font-weight:500;line-height:1.3;}
.dtk-sub{font-size:10px;margin-top:2px;opacity:.7;}
.dtk-ft{display:flex;align-items:center;justify-content:space-between;margin-top:5px;gap:4px;}
.dtk-ck{width:14px;height:14px;border:0.5px solid rgba(0,0,0,0.3);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.dtk-ck.dn{background:#3b6d11;border-color:#3b6d11;}
.dtk-ck.dn::after{content:'';display:block;width:7px;height:4px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);}
.dtk-edit{background:none;border:none;cursor:pointer;font-size:10px;color:inherit;padding:1px 3px;border-radius:3px;font-family:inherit;opacity:0;transition:opacity .15s;}
.dtk:hover .dtk-edit{opacity:.7;}
.dph{border:0.5px dashed var(--bd2);border-radius:6px;padding:12px 9px;font-size:11px;color:var(--tx3);text-align:center;margin-bottom:6px;display:none;}
.dc.dov .dph{display:block;}
.atd{width:100%;padding:5px 8px;background:none;border:none;font-size:11px;color:var(--tx3);text-align:left;cursor:pointer;border-radius:4px;font-family:inherit;}
.atd:hover{color:var(--tx2);background:var(--bg2);}
.tmg{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
.mc{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;}
.mh{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--bd);}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;}
.mn2{font-weight:500;font-size:13px;}
.mr2{font-size:11px;color:var(--tx3);}
.mst{display:flex;gap:12px;padding:10px 16px;border-bottom:0.5px solid var(--bd);}
.sv{font-size:18px;font-weight:500;line-height:1.1;}
.sl{font-size:10px;color:var(--tx3);margin-top:1px;text-align:center;}
.mt{padding:8px 12px 12px;}
.done-sec{margin-bottom:20px;}
.done-sh{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;padding:4px 0 8px;border-bottom:0.5px solid var(--bd);margin-bottom:10px;}
.done-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);margin-bottom:8px;overflow:hidden;}
.done-ch{padding:12px 16px;display:flex;align-items:flex-start;gap:10px;}
.done-tick{width:18px;height:18px;border-radius:4px;background:#3b6d11;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.done-tick::after{content:'';display:block;width:9px;height:6px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);}
.done-title{font-size:13px;font-weight:500;flex:1;}
.done-meta{font-size:11px;color:var(--tx3);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.done-note{font-size:12px;color:var(--tx2);font-style:italic;padding:0 16px 12px 44px;}
#mo{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:100;}
#mo.on{display:flex;}
#md{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--bd2);width:520px;max-width:calc(100vw - 32px);max-height:92vh;overflow-y:auto;}
.mhd{padding:16px 20px;border-bottom:0.5px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg);z-index:1;}
.mhd h3{font-size:14px;font-weight:500;}
.mstp{font-size:11px;color:var(--tx3);margin-top:3px;}
.mcl{background:none;border:none;cursor:pointer;font-size:20px;color:var(--tx3);line-height:1;flex-shrink:0;}
.mb{padding:20px;}
.fi{margin-bottom:14px;}
.fi label{display:block;font-size:12px;color:var(--tx2);margin-bottom:5px;}
.fi input,.fi select,.fi textarea{width:100%;padding:7px 10px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx);font-size:13px;font-family:inherit;}
.fi input:focus,.fi select:focus,.fi textarea:focus{outline:none;border-color:var(--itx);}
.fi textarea{resize:vertical;min-height:70px;}
.frow{display:flex;gap:10px;}
.frow .fi{flex:1;margin-bottom:14px;}
.mft{padding:12px 20px;border-top:0.5px solid var(--bd);display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;background:var(--bg);}
.mftr{display:flex;gap:8px;}
.mpk{border:0.5px solid var(--bd2);border-radius:var(--r);overflow:hidden;}
.mpk-row{display:flex;align-items:center;gap:10px;padding:7px 10px;cursor:pointer;transition:background .1s;}
.mpk-row:hover{background:var(--bg2);}
.mpk-row input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--itx);}
.mpk-name{font-size:13px;flex:1;}
.mpk-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;}
.tbd{border:0.5px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-top:4px;}
.tbdh{padding:9px 14px;background:var(--bg2);font-size:12px;font-weight:500;color:var(--tx2);border-bottom:0.5px solid var(--bd);}
.tbdl{max-height:300px;overflow-y:auto;}
.tbt{display:flex;align-items:center;gap:7px;padding:8px 10px;border-bottom:0.5px solid var(--bd);}
.tbt:last-child{border-bottom:none;}
.tbn{font-size:11px;color:var(--tx3);width:16px;flex-shrink:0;text-align:right;}
.tbt input[type=text]{flex:1;min-width:0;padding:5px 8px;border:0.5px solid var(--bd2);border-radius:6px;font-size:12px;background:var(--bg);color:var(--tx);font-family:inherit;}
.tbt input[type=date]{padding:5px 7px;border:0.5px solid var(--bd2);border-radius:6px;font-size:11px;background:var(--bg);color:var(--tx);font-family:inherit;width:130px;flex-shrink:0;}
.tba-sel{padding:5px 6px;border:0.5px solid var(--bd2);border-radius:6px;font-size:11px;background:var(--bg);color:var(--tx);font-family:inherit;flex-shrink:0;min-width:90px;}
.tbrm{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:16px;line-height:1;padding:0 2px;flex-shrink:0;}
.tbrm:hover{color:var(--dtx);}
.tbab{padding:9px 14px;font-size:12px;color:var(--tx3);cursor:pointer;background:none;border:none;font-family:inherit;text-align:left;width:100%;display:block;}
.tbab:hover{background:var(--bg2);color:var(--tx2);}
.shi{font-size:11px;color:var(--itx);background:var(--ibg);padding:8px 12px;border-radius:6px;margin-top:10px;}
#cop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;}
#cop.on{display:flex;}
#copc{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--bd2);width:440px;max-width:calc(100vw - 32px);padding:28px 28px 20px;text-align:center;}
.co-icon{font-size:36px;margin-bottom:12px;}
#copc h3{font-size:16px;font-weight:500;margin-bottom:6px;}
#copc p{font-size:13px;color:var(--tx2);margin-bottom:20px;}
#conote{width:100%;padding:9px 12px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx);font-size:13px;font-family:inherit;resize:vertical;min-height:80px;text-align:left;margin-bottom:16px;}
#conote:focus{outline:none;border-color:var(--itx);}
.co-btns{display:flex;gap:8px;justify-content:center;}
select{cursor:pointer;}
</style>
</head>
<body>
<div id="lock">
  <div class="lcard">
    <h2>Team Planner</h2>
    <p>Enter your team password to continue</p>
    <input type="password" id="pwi" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="lerr" id="pwe"></div>
    <button class="btn btnp" style="width:100%;padding:9px;" onclick="checkPw()">Unlock</button>
  </div>
</div>
<canvas id="cv"></canvas>
<div id="app">
  <div id="sb">
    <div class="sbh"><h1>Team Planner</h1><p><span id="sdot"></span><span id="slbl">Connecting...</span></p></div>
    <div class="navs">
      <div class="nl">Views</div>
      <button class="nb on" onclick="sv('goals')" id="nv-goals"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.2"/><circle cx="7" cy="7" r="2" fill="currentColor"/></svg>Goals &amp; activities</button>
      <button class="nb" onclick="sv('week')" id="nv-week"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M1 5h12" stroke="currentColor" stroke-width="1.2"/><path d="M4 1v2M10 1v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>Week plan</button>
      <button class="nb" onclick="sv('team')" id="nv-team"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="5" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2"/><circle cx="10" cy="5" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M1 12c0-2 1.8-3.5 4-3.5s4 1.5 4 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M11 8.5c1.2.4 2 1.5 2 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>Team board</button>
      <button class="nb" onclick="sv('done')" id="nv-done"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L12 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Done</button>
      <div class="nl" style="margin-top:16px;">Weeks</div>
      <div id="sbwks"></div>
    </div>
    <div class="tms"><div class="nl">Team</div><div id="sbmbs"></div></div>
  </div>
  <div id="mn">
    <div id="tb">
      <h2 id="vtitle">Goals &amp; Activities</h2>
      <div class="tbr">
        <select id="mf" class="btn" onchange="ra()"><option value="all">All members</option></select>
        <button class="btn btnp" id="ab" onclick="openGoalModal()">+ Add goal</button>
      </div>
    </div>
    <div id="ct"></div>
  </div>
</div>
<div id="mo" onclick="if(event.target===this)cm()">
  <div id="md">
    <div class="mhd"><div><h3 id="mtitle">Add goal</h3><div class="mstp" id="mstp"></div></div><button class="mcl" onclick="cm()">x</button></div>
    <div class="mb" id="mbody"></div>
    <div class="mft"><div id="mfl"></div><div class="mftr"><button class="btn" onclick="cm()">Cancel</button><button class="btn btnp" id="msave" onclick="hmSave()">Save</button></div></div>
  </div>
</div>
<div id="cop" onclick="if(event.target===this)cancelComp()">
  <div id="copc">
    <div class="co-icon">&#127881;</div>
    <h3 id="co-title">Task completed!</h3>
    <p>Add a note about what was accomplished (optional)</p>
    <textarea id="conote" placeholder="e.g. Sent to all stakeholders, received positive feedback..."></textarea>
    <div class="co-btns"><button class="btn" onclick="cancelComp()">Cancel</button><button class="btn btnp" onclick="confirmComp()">Mark as done</button></div>
  </div>
</div>
<div id="toast"></div>
<script>
const SBU='https://ougdszmisjtjmvmdgflc.supabase.co';
const SBK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Rzem1pc2p0am12bWRnZmxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjU1ODksImV4cCI6MjA4OTQwMTU4OX0.sfFRVT53IdHtcDRl01WfKiwEs9hEHxOB2mk4KvhkoEE';
const PW='SbWbud3ttPAULf';
const MBS=[{id:1,name:'Ameli Q',ini:'AQ',role:'Digital Specialist',ci:0},{id:2,name:'Sara F',ini:'SF',role:'E-Commerce Specialist',ci:1},{id:3,name:'Marcus A',ini:'MA',role:'Customer Insights Analyst',ci:2},{id:4,name:'New Member',ini:'NM',role:'Retention Specialist',ci:3}];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmid(){const v=document.getElementById('mf').value;return v==='all'?null:parseInt(v);}
function ids(a){return Array.isArray(a)?a:[];}
function fmtD(d){if(!d)return '';return new Date(d+'T00:00:00').toLocaleDateString('en-SE',{day:'numeric',month:'short'});}
function dlB(d){
  if(!d)return '';
  const df=(new Date(d+'T00:00:00')-new Date(TODAY+'T00:00:00'))/86400000;
  const l=fmtD(d);
  if(df<0)return '<span class="dlb dlx">&#9888; '+l+'</span>';
  if(df<=7)return '<span class="dlb dls">&#9203; '+l+'</span>';
  return '<span class="dlb dlo">&#128197; '+l+'</span>';
}
function apills(arr){if(!arr||!arr.length)return '';return arr.map(id=>{const m=mbById(id);if(!m)return '';const c=cl(m.ci);return '<span class="apil" style="background:'+c.bg+';color:'+c.tx+';">'+m.ini+'</span>';}).join('');}
function gProg(gid){const t=tasks.filter(t=>t.goal_id===gid);return t.length?Math.round(t.filter(t=>t.done).length/t.length*100):0;}
function aProg(aid){const t=tasks.filter(t=>t.activity_id===aid);return t.length?Math.round(t.filter(t=>t.done).length/t.length*100):0;}
function stB(s){if(s==='done')return '<span class="dlb dlo">Done</span>';if(s==='in-progress')return '<span class="dlb" style="background:var(--ibg);color:var(--itx);">In progress</span>';return '<span class="dlb" style="background:var(--bg2);color:var(--tx3);">Not started</span>';}
function sched(dl,idx,total){
  if(!dl)return {wi:curWk,di:TDI};
  const dld=new Date(dl+'T00:00:00');
  let dlwi=WKS.length-1,dldi=4;
  for(let wi=0;wi<WKS.length;wi++){const mon=new Date(WKS[wi].md+'T00:00:00');for(let di=0;di<5;di++){const d=new Date(mon);d.setDate(mon.getDate()+di);if(d<=dld){dlwi=wi;dldi=di;}else break;}if(new Date(WKS[wi].md+'T00:00:00')>dld)break;}
  if(total<=1)return {wi:dlwi,di:dldi};
  const s0=TWI*5+TDI,s1=dlwi*5+dldi,rng=Math.max(s1-s0,total-1),step=rng/(total-1),slot=Math.round(s0+step*idx),cs=Math.min(slot,s1);
  return {wi:Math.min(Math.floor(cs/5),WKS.length-1),di:cs%5};
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400);}
async function load(){
  ss('sy','Loading...');
  document.getElementById('ct').innerHTML='<div class="ldg"><div class="spin"></div>Loading...</div>';
  try{
    const[gr,ar,tr]=await Promise.all([db.from('goals').select('*').order('created_at'),db.from('activities').select('*').order('created_at'),db.from('tasks').select('*').order('created_at')]);
    if(gr.error)throw gr.error;
    goals=gr.data||[];acts=ar.data||[];tasks=tr.data||[];
    goals.forEach(g=>{g.assignee_ids=ids(g.assignee_ids);if(oG[g.id]===undefined)oG[g.id]=true;});
    acts.forEach(a=>{a.assignee_ids=ids(a.assignee_ids);if(oA[a.id]===undefined)oA[a.id]=true;});
    tasks.forEach(t=>{t.assignee_ids=ids(t.assignee_ids);if(!t.assignee_ids.length&&t.assignee_id)t.assignee_ids=[t.assignee_id];});
    ss('','Live');ra();
  }catch(e){ss('er','Error');document.getElementById('ct').innerHTML='<div class="ldg">Could not connect.</div>';}
}
function subRT(){
  db.channel('ch1').on('postgres_changes',{event:'*',schema:'public',table:'goals'},()=>load()).on('postgres_changes',{event:'*',schema:'public',table:'activities'},()=>load()).on('postgres_changes',{event:'*',schema:'public',table:'tasks'},()=>load()).subscribe(s=>{if(s==='SUBSCRIBED')ss('','Live');if(s==='CLOSED'||s==='CHANNEL_ERROR')ss('er','Reconnecting...');});
}
async function dbI(tbl,obj){ss('sy','Saving...');const{error}=await db.from(tbl).insert(obj);if(error)toast('Save error: '+error.message);ss('','Live');}

async function dbD(tbl,id){ss('sy','Deleting...');await db.from(tbl).delete().eq('id',id);ss('','Live');}

function rWeek(){

  const wd=WKS[curWk],mon=new Date(wd.md+'T00:00:00');
  let h='<div class="wg">';
  DAYS.forEach((day,di)=>{
    const dt=wt.filter(t=>t.day_idx===di),d=new Date(mon);d.setDate(mon.getDate()+di);
    const isT=curWk===TWI&&di===TDI;
    h+='<div class="dc" id="dc'+di+'" ondragover="dOver(event,'+di+')" ondragleave="dLeave('+di+')" ondrop="dDrop(event,'+di+')">';

    h+='<div class="dts"><div class="dph">Drop here</div>';

      const g=goals.find(g=>g.id===t.goal_id),gc=g?cl(g.color_idx||0):CLS[0];

function dStart(e,id){
  dragId=id;dragEl=e.currentTarget;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',String(id));
  setTimeout(()=>{if(dragEl)dragEl.style.opacity='.4';},0);
}
function dEnd(){
  if(dragEl){dragEl.style.opacity='';dragEl=null;}
  dragId=null;
  document.querySelectorAll('.dc').forEach(c=>c.classList.remove('dov'));
}
function dOver(e,di){e.preventDefault();e.dataTransfer.dropEffect='move';document.getElementById('dc'+di)?.classList.add('dov');}
function dLeave(di){document.getElementById('dc'+di)?.classList.remove('dov');}
function dDrop(e,di){
  e.preventDefault();
  document.querySelectorAll('.dc').forEach(c=>c.classList.remove('dov'));
  if(dragEl){dragEl.style.opacity='';dragEl=null;}
  const id=dragId||e.dataTransfer.getData('text/plain');
  dragId=null;
  if(!id)return;
  dbU('tasks',{week_idx:curWk,day_idx:di},id);
}

function rDone(){
  const fid=fmid(),done=tasks.filter(t=>t.done&&(!fid||t.assignee_ids.includes(fid))).sort((a,b)=>new Date(b.completed_at||0)-new Date(a.completed_at||0));
  if(!done.length){document.getElementById('ct').innerHTML='<div class="ldg" style="padding:40px 20px;">No completed tasks yet. Get to work!</div>';return;}
  let h='';
  if(fid){
    const m=MBS.find(m=>m.id===fid);
    h+='<div class="done-sec"><div class="done-sh">'+(m?m.name:'')+' &mdash; '+done.length+' completed</div>';
    done.forEach(t=>{h+=doneCard(t);});
    h+='</div>';
  } else {
    const byG={};done.forEach(t=>{const k=t.goal_id||'none';if(!byG[k])byG[k]=[];byG[k].push(t);});
    Object.entries(byG).forEach(([gid,ts])=>{
      const g=goals.find(g=>g.id===gid);
      h+='<div class="done-sec"><div class="done-sh">'+(g?esc(g.title):'No goal')+' &mdash; '+ts.length+' completed</div>';
      ts.forEach(t=>{h+=doneCard(t);});
      h+='</div>';
    });
  }
  document.getElementById('ct').innerHTML=h;
}
function doneCard(t){
  const g=goals.find(g=>g.id===t.goal_id),gc=g?cl(g.color_idx||0):CLS[0],a=acts.find(a=>a.id===t.activity_id);

  return '<div class="done-card"><div class="done-ch"><div class="done-tick"></div><div style="flex:1;min-width:0;">'
    +'<div class="done-title">'+esc(t.title)+'</div>'
    +'<div class="done-meta">'+(g?'<span style="color:'+gc.dt+';">&#9670; '+esc(g.title)+'</span>':'')+(a?'<span>&middot; '+esc(a.title)+'</span>':'')+apills(t.assignee_ids)+(ds?'<span>&middot; '+ds+'</span>':'')+'</div>'
    +'</div></div>'+(t.completion_note?'<div class="done-note">"'+esc(t.completion_note)+'"</div>':'')+'</div>';
}
function openComp(id){

  document.getElementById('co-title').textContent=title;

  document.getElementById('cop').classList.add('on');
  setTimeout(()=>document.getElementById('conote').focus(),50);
}
function cancelComp(){document.getElementById('cop').classList.remove('on');compPendId=null;}
async function confirmComp(){
  if(!compPendId)return;
  const note=document.getElementById('conote').value.trim();
  document.getElementById('cop').classList.remove('on');
  await dbU('tasks',{done:true,completion_note:note||null,completed_at:new Date().toISOString()},compPendId);
  compPendId=null;doConfetti();toast('Task marked as done!');
}
function doConfetti(){
  const cv=document.getElementById('cv');cv.width=window.innerWidth;cv.height=window.innerHeight;cv.style.display='block';
  const ctx=cv.getContext('2d');
  const cols=['#378ADD','#1D9E75','#EF9F27','#D4537E','#E85D24','#8B5CF6','#EC4899','#F59E0B'];
  const ps=[];
  for(let i=0;i<180;i++)ps.push({x:Math.random()*cv.width,y:Math.random()*cv.height*0.5-cv.height*0.2,w:Math.random()*11+4,h:Math.random()*5+3,r:Math.random()*Math.PI*2,dr:(Math.random()-.5)*.3,dy:Math.random()*3.5+1.5,dx:(Math.random()-.5)*2,col:cols[Math.floor(Math.random()*cols.length)],op:1});
  let f=0;
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{ctx.save();ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.r);ctx.globalAlpha=p.op;ctx.fillStyle=p.col;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();p.y+=p.dy;p.x+=p.dx;p.r+=p.dr;if(f>70)p.op=Math.max(0,p.op-.018);});
    f++;if(f<130)requestAnimationFrame(draw);else{ctx.clearRect(0,0,cv.width,cv.height);cv.style.display='none';}
  })();
}

function busy(b){const btn=document.getElementById('msave');btn.disabled=b;btn.textContent=b?'Saving...':(btn._l||'Save');}
function mpicker(sel){
  return '<div class="mpk">'+MBS.map(m=>{const c=cl(m.ci);return '<label class="mpk-row"><input type="checkbox" value="'+m.id+'" '+(sel.includes(m.id)?'checked':'')+' ><div class="mpk-av" style="background:'+c.bg+';color:'+c.tx+';">'+m.ini+'</div><span class="mpk-name">'+m.name+'</span></label>';}).join('')+'</div>';
}
function getMP(){return [...document.querySelectorAll('.mpk input:checked')].map(i=>parseInt(i.value));}
function openGoalModal(pre){
  pre=pre||{};mMode='goal';mCtx=pre;
  document.getElementById('mtitle').textContent=pre.id?'Edit goal':'Add goal';
  document.getElementById('mstp').textContent='';document.getElementById('mfl').innerHTML='';
  const btn=document.getElementById('msave');btn.textContent='Save';btn._l='Save';
  document.getElementById('mbody').innerHTML='<div class="fi"><label>Goal title</label><input id="ft" value="'+esc(pre.title||'')+'"></div>'
    +'<div class="frow"><div class="fi"><label>Colour</label><select id="fc">'+CLS.map((_,i)=>'<option value="'+i+'" '+((pre.color_idx||0)===i?'selected':'')+'>Colour '+(i+1)+'</option>').join('')+'</select></div>'
    +'<div class="fi"><label>Deadline (optional)</label><input type="date" id="fd" value="'+(pre.deadline||'')+'" min="'+TODAY+'"></div></div>'
    +'<div class="fi"><label>Responsible people</label>'+mpicker(pre.assignee_ids||[])+'</div>';
  document.getElementById('mo').classList.add('on');
  setTimeout(()=>document.getElementById('ft')?.focus(),50);
}
function openEditGoal(id){const g=goals.find(g=>g.id===id);if(g)openGoalModal(Object.assign({},g));}
function openActModal(gid,pre){
  pre=pre||{};mMode='activity';mCtx=Object.assign({gid:gid},pre);pendTasks=[];
  const g=goals.find(g=>g.id===gid),isEdit=!!pre.id;
  document.getElementById('mtitle').textContent=isEdit?'Edit activity':'Add activity';
  document.getElementById('mstp').textContent=isEdit?'':'Step 1 of 2';
  document.getElementById('mfl').innerHTML='';
  const btn=document.getElementById('msave');btn.textContent=isEdit?'Save':'Next: Add tasks';btn._l=btn.textContent;
  document.getElementById('mbody').innerHTML='<div class="fi"><label>Goal</label><input value="'+(g?esc(g.title):'')+'" disabled style="opacity:.6;"></div>'
    +'<div class="fi"><label>Activity title</label><input id="ft" value="'+esc(pre.title||'')+'"></div>'
    +'<div class="frow"><div class="fi"><label>Status</label><select id="fst"><option value="not-started" '+((pre.status||'not-started')==='not-started'?'selected':'')+'>Not started</option><option value="in-progress" '+(pre.status==='in-progress'?'selected':'')+'>In progress</option><option value="done" '+(pre.status==='done'?'selected':'')+'>Done</option></select></div>'
    +'<div class="fi"><label>Deadline</label><input type="date" id="fd" value="'+(pre.deadline||'')+'" min="'+TODAY+'"></div></div>'
    +'<div class="fi"><label>Responsible people</label>'+mpicker(pre.assignee_ids||[])+'</div>';
  document.getElementById('mo').classList.add('on');
  setTimeout(()=>document.getElementById('ft')?.focus(),50);
}
function openEditAct(id){const a=acts.find(a=>a.id===id);if(a)openActModal(a.goal_id,Object.assign({},a));}
function openTB(){
  const title=(mCtx.actTitle||'');
  document.getElementById('mtitle').textContent=title.length>36?title.slice(0,36)+'...':title;
  document.getElementById('mstp').textContent='Step 2 of 2 - Break into tasks';
  document.getElementById('mfl').innerHTML='<button class="btn" onclick="openActModal(\''+mCtx.gid+'\',{id:\''+mCtx.id+'\',title:\''+esc(mCtx.actTitle||'')+'\',status:\''+mCtx.actSt+'\',deadline:\''+mCtx.actDl+'\',assignee_ids:[]})">Back</button>';
  const btn=document.getElementById('msave');btn.textContent='Save all';btn._l='Save all';
  if(!pendTasks.length)pendTasks=[{title:'',aIds:[1],dl:mCtx.actDl||''}];
  rerTB();
  setTimeout(()=>document.querySelector('.tbt input[type=text]')?.focus(),50);
}
function rerTB(){
  const dl=mCtx.actDl||'';
  const hint=dl?'<div class="shi">Tasks auto-scheduled from today to '+fmtD(dl)+'.</div>':'';
  const rows=pendTasks.map((t,i)=>'<div class="tbt"><span class="tbn">'+(i+1)+'.</span><input type="text" placeholder="Task title" value="'+esc(t.title)+'" oninput="pendTasks['+i+'].title=this.value"><select class="tba-sel" multiple size="1" title="Ctrl/Cmd to multi-select" onchange="ptA('+i+',this)">'+MBS.map(m=>'<option value="'+m.id+'" '+((t.aIds||[]).includes(m.id)?'selected':'')+'>'+m.ini+'</option>').join('')+'</select><input type="date" value="'+(t.dl||'')+'" min="'+TODAY+'" onchange="pendTasks['+i+'].dl=this.value"><button class="tbrm" onclick="remPT('+i+')">x</button></div>').join('');
  document.getElementById('mbody').innerHTML='<p style="font-size:12px;color:var(--tx3);margin-bottom:12px;">Each task counts toward activity completion. Hold Ctrl/Cmd to multi-select assignees.</p>'
    +'<div class="tbd"><div class="tbdh">Tasks ('+pendTasks.length+')</div><div class="tbdl">'+rows+'</div><button class="tbab" onclick="addPT()">+ Add another task</button></div>'+hint;
}
function ptA(i,sel){pendTasks[i].aIds=[...sel.selectedOptions].map(o=>parseInt(o.value));}
function addPT(){pendTasks.push({title:'',aIds:[1],dl:mCtx.actDl||''});rerTB();setTimeout(()=>{const ins=document.querySelectorAll('.tbt input[type=text]');ins[ins.length-1]?.focus();},30);}
function remPT(i){pendTasks.splice(i,1);rerTB();}
function openTaskModal(ctx,pre){
  ctx=ctx||{};pre=pre||{};mMode='task';mCtx=Object.assign({},ctx,pre);
  const isEdit=!!pre.id;
  document.getElementById('mtitle').textContent=isEdit?'Edit task':'Add task';
  document.getElementById('mstp').textContent='';document.getElementById('mfl').innerHTML='';
  const btn=document.getElementById('msave');btn.textContent='Save';btn._l='Save';
  const fG=ctx.gid?goals.find(g=>g.id===ctx.gid):goals[0];
  const aOpts=fG?acts.filter(a=>a.goal_id===fG.id).map(a=>'<option value="'+a.id+'" '+(pre.activity_id===a.id?'selected':'')+'>'+esc(a.title)+'</option>').join(''):'';
  document.getElementById('mbody').innerHTML='<div class="fi"><label>Task title</label><input id="ft" value="'+esc(pre.title||'')+'"></div>'
    +'<div class="frow"><div class="fi"><label>Goal</label><select id="fg" onchange="updAL()">'+goals.map(g=>'<option value="'+g.id+'" '+((ctx.gid||pre.goal_id)===g.id?'selected':'')+'>'+esc(g.title)+'</option>').join('')+'</select></div>'
    +'<div class="fi"><label>Activity</label><select id="fa">'+aOpts+'</select></div></div>'
    +'<div class="fi"><label>Responsible people</label>'+mpicker(pre.assignee_ids&&pre.assignee_ids.length?pre.assignee_ids:[1])+'</div>'
    +'<div class="frow"><div class="fi"><label>Deadline</label><input type="date" id="fd" value="'+(pre.deadline||'')+'" min="'+TODAY+'" onchange="awFill()"></div>'
    +'<div class="fi"><label>Week</label><select id="fw">'+WKS.map((w,i)=>'<option value="'+i+'" '+((ctx.wi===i||pre.week_idx===i)?'selected':'')+'>'+w.dp+'</option>').join('')+'</select></div></div>'
    +'<div class="fi"><label>Day</label><select id="fday">'+DAYS.map((d,i)=>'<option value="'+i+'" '+((ctx.di===i||pre.day_idx===i)?'selected':'')+'>'+d+'</option>').join('')+'</select></div>';
  document.getElementById('mo').classList.add('on');
  setTimeout(()=>document.getElementById('ft')?.focus(),50);
}
function openEditTask(id){const t=tasks.find(t=>t.id===id);if(t)openTaskModal({gid:t.goal_id,wi:t.week_idx,di:t.day_idx},Object.assign({},t));}
function updAL(){const gid=document.getElementById('fg').value;document.getElementById('fa').innerHTML=acts.filter(a=>a.goal_id===gid).map(a=>'<option value="'+a.id+'">'+esc(a.title)+'</option>').join('');}
function awFill(){const dl=document.getElementById('fd').value;if(!dl)return;const s=sched(dl,0,1);document.getElementById('fw').value=s.wi;document.getElementById('fday').value=s.di;}
async function hmSave(){if(mMode==='goal')await svG();else if(mMode==='activity')advAct();else if(mMode==='activity-tasks')await svAT();else if(mMode==='task')await svT();}
async function svG(){
  const title=document.getElementById('ft')?.value?.trim();if(!title)return;
  busy(true);
  const obj={title,color_idx:parseInt(document.getElementById('fc').value),deadline:document.getElementById('fd').value||null,assignee_ids:getMP()};
  if(mCtx.id)await dbU('goals',obj,mCtx.id);else await dbI('goals',obj);
  busy(false);cm();
}
function advAct(){
  const title=document.getElementById('ft')?.value?.trim();if(!title)return;
  mCtx=Object.assign({},mCtx,{actTitle:title,actSt:document.getElementById('fst').value,actDl:document.getElementById('fd').value,actAIds:getMP()});
  if(mCtx.id){(async()=>{busy(true);await dbU('activities',{title:mCtx.actTitle,status:mCtx.actSt,deadline:mCtx.actDl||null,assignee_ids:mCtx.actAIds},mCtx.id);busy(false);cm();})();return;}
  mMode='activity-tasks';pendTasks=pendTasks.map(t=>Object.assign({},t,{dl:t.dl||mCtx.actDl||''}));openTB();
}
async function svAT(){
  const valid=pendTasks.filter(t=>t.title.trim());busy(true);
  const{data:act,error}=await db.from('activities').insert({goal_id:mCtx.gid,title:mCtx.actTitle,status:mCtx.actSt,deadline:mCtx.actDl||null,assignee_ids:mCtx.actAIds||[]}).select().single();
  if(error){toast('Error: '+error.message);busy(false);return;}
  oG[mCtx.gid]=true;oA[act.id]=true;
  for(let i=0;i<valid.length;i++){const t=valid[i],edl=t.dl||mCtx.actDl||null,sc=sched(edl,i,valid.length);await dbI('tasks',{goal_id:mCtx.gid,activity_id:act.id,title:t.title.trim(),assignee_ids:t.aIds||[1],assignee_id:(t.aIds||[1])[0],week_idx:sc.wi,day_idx:sc.di,done:false,deadline:edl});}
  busy(false);cm();toast('Activity saved with '+valid.length+' task'+(valid.length!==1?'s':'')+'!');
}
async function svT(){
  const title=document.getElementById('ft')?.value?.trim();if(!title)return;
  busy(true);
  const dl=document.getElementById('fd').value||null;
  const obj={title,goal_id:document.getElementById('fg').value,activity_id:document.getElementById('fa').value,assignee_ids:getMP(),assignee_id:(getMP()[0]||1),week_idx:parseInt(document.getElementById('fw').value),day_idx:parseInt(document.getElementById('fday').value),deadline:dl,done:mCtx.done||false};
  if(mCtx.id)await dbU('tasks',obj,mCtx.id);else await dbI('tasks',obj);
  busy(false);cm();
}
document.getElementById('md').addEventListener('keydown',e=>{if(e.key==='Enter'&&!['TEXTAREA','SELECT','BUTTON'].includes(e.target.tagName)){e.preventDefault();hmSave();}if(e.key==='Escape')cm();});
document.getElementById('cop').addEventListener('keydown',e=>{if(e.key==='Escape')cancelComp();});
async function init(){await load();subRT();}
if(sessionStorage.getItem('a')==='1')init();
</script>
</body>
</html>
